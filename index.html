<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Survey Reward</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .offer-container {
            text-align: center;
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            max-width: 450px;
            width: 90%;
        }
        /* অফারের ছবির স্টাইল */
        .offer-banner {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }
        /* চাকা ঘোরার অ্যানিমেশন */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // ২ সেকেন্ড (২০০০ মিলিসেকেন্ড) পর অটোমেটিক রিডাইরেক্ট হবে
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://singingfiles.com/show.php?l=0&u=2530338&id=73209";
            }, 2000); 
        };
    </script>
</head>
<body>

    <div class="offer-container">
        <img src="https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=500&auto=format&fit=crop&q=60" alt="Special Offer" class="offer-banner">
        
        <div class="loading-text">Verifying Your Cash Reward Entry...</div>
        <div class="spinner"></div>
    </div>

</body>
</html>
