<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win $750 Venmo Gift Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 30px;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }
        h1 {
            font-size: 24px;
            color: #00d26a; /* Venmo style green */
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #b3b3b3;
            line-height: 1.5;
        }
        .countdown {
            font-size: 22px;
            font-weight: bold;
            color: #0072e3; /* Accent blue */
            margin: 20px 0;
        }
        .loader {
            border: 4px solid #333;
            border-radius: 50%;
            border-top: 4px solid #00d26a;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fallback-link {
            display: inline-block;
            margin-top: 15px;
            color: #0072e3;
            text-decoration: none;
            font-size: 14px;
        }
        .fallback-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loader"></div>
    <h1>Connecting to Secure Server...</h1>
    <p>Please wait while we redirect you to the <strong>$750 Venmo Gift Card</strong> offer page.</p>
    
    <div class="countdown">Redirecting in <span id="timer">3</span> seconds...</div>
    
    <p style="font-size: 12px; color: #666;">Note: This offer is exclusively available for Mobile Users in the United States.</p>
    
    <a class="fallback-link" id="redirect-link" href="YOUR_OFFER_LINK_HERE">Click here if you are not redirected automatically</a>
</div>

<script>
    // আপনার অফার লিংকটি এখানে বসান
    const offerLink = "https://www.cstmd.com/view.php?id=5545406&pub=3528704";
    
    // ফলব্যাক লিংকের href আপডেট করা
    document.getElementById('redirect-link').href = offerLink;

    let seconds = 3;
    const timerElement = document.getElementById('timer');

    // কাউন্টডাউন টাইমার ফাংশন
    const countdown = setInterval(() => {
        seconds--;
        timerElement.textContent = seconds;
        
        if (seconds <= 0) {
            clearInterval(countdown);
            window.location.href = offerLink; // রিডাইরেক্ট অ্যাকশন
        }
    }, 1000);
</script>

</body>
</html>
